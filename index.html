<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a2332">
  <title>PediCalc EMR - Clinical Decision Support</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="description" content="27 evidence-based pediatric clinical calculators for point-of-care decision support">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    html, body, #root {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    body {
      background: #ffffff;
      touch-action: pan-y;
    }
    
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #1a2332;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: #4d94ff;
      font-family: 'IBM Plex Mono', monospace;
      z-index: 9999;
    }
    
    #loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(77,148,255,0.2);
      border-top-color: #4d94ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    #loading-text {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div id="loading-spinner"></div>
    <div id="loading-text">Loading PediCalc...</div>
  </div>
  <div id="root"></div>
  
  <!-- Babel Standalone: transpiles JSX → plain JS at runtime -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="module">
    import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18.2.0';
    import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';

    async function loadApp() {
      try {
        // Load the JSX component source
        const response = await fetch('PediatricCalc.jsx');
        const code = await response.text();

        // Strip import lines and the export default keyword
        const componentCode = code
          .replace(/^import.*?;?\n/gm, '')
          .replace(/export default /, '');

        // CRITICAL: Transpile JSX → plain JS before passing to new Function()
        // new Function() only accepts standard JS, not JSX syntax
        const transpiled = Babel.transform(componentCode, {
          presets: ['react']
        }).code;

        // Create a function that returns the App component
        const componentFn = new Function('React', 'useState', 'useEffect', 'useRef', `
          const { useState, useEffect, useRef } = React;
          ${transpiled}
          return App;
        `);

        const App = componentFn(React, useState, useEffect, useRef);
        
        // Hide loading screen
        document.getElementById('loading').style.display = 'none';
        
        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
        
      } catch (error) {
        console.error('Failed to load app:', error);
        document.getElementById('loading-text').textContent = 'Error loading app';
        document.getElementById('loading-text').style.color = '#db3737';
      }
    }
    
    // Register service worker for PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('Service Worker registered'))
          .catch(err => console.log('Service Worker registration failed:', err));
      });
    }
    
    // Load the app
    loadApp();
  </script>
</body>
</html>
